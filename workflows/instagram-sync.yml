name: Sync Instagram

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Run script
        run: npm run instagram-sync

      - name: Commit cambios
        run: |
          git config --global user.name "instagram-bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Auto update Instagram" || echo "Sin cambios"

      - name: Pull + Push seguro
        run: |
          git pull --rebase origin main
          git push origin HEAD:main