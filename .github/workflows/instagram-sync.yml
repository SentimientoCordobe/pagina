name: Instagram Sync

on:
  schedule:
    - cron: "0 * * * *" # cada hora
  workflow_dispatch: # ejecución manual

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Instalar pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 3. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      # 4. Instalar dependencias
      - name: Install dependencies
        run: pnpm install

      # 5. Ejecutar tu script EXACTO
      - name: Run Instagram sync
        run: pnpm instagram-sync

      # 6. Commit automático del JSON
      - name: Commit changes
        run: |
          git config user.name "instagram-bot"
          git config user.email "bot@github.com"

          git add src/data/noticias.json

          git commit -m "chore: update instagram feed" || echo "No changes"

          git push