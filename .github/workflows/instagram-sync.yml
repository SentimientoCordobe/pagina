 mname: Sync Instagram News

on:
  schedule:
    - cron: "*/30 * * * *"   # cada 30 minutos
  workflow_dispatch:
name: Sync Instagram News

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar script Instagram Sync
        run: npm run instagram-sync

      - name: Commit cambios y push
        run: |
          git config --global user.name "instagram-bot"
          git config --global user.email "bot@github.com"
          git add src/data/noticias.ts
          git diff --quiet && git diff --staged --quiet || git commit -m "Sync Instagram posts"
          git push
